name: "03 - Автоматическое обновление версии"

on:
  pull_request:
    branches: [main, master]
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump-version:
    name: "Обновление версии"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      old_version: ${{ steps.bump.outputs.old_version }}
      version_type: ${{ steps.bump.outputs.version_type }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug information
        run: |
          echo "=== ОТЛАДОЧНАЯ ИНФОРМАЦИЯ ==="
          echo "Событие: ${{ github.event_name }}"
          echo "Ветка PR (base): ${{ github.event.pull_request.base.ref }}"
          echo "Ветка PR (head): ${{ github.event.pull_request.head.ref }}"
          echo "Мерж выполнен: ${{ github.event.pull_request.merged }}"
          echo "Коммит PR: ${{ github.event.pull_request.merge_commit_sha }}"
          echo "Репозиторий: ${{ github.repository }}"
          echo "================================"
          echo "Текущая директория:"
          pwd
          echo "Содержимое:"
          ls -la

      - name: Get current version
        id: get_current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.1.0"
            echo "0.1.0" > VERSION
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Текущая версия: $CURRENT_VERSION"

      - name: Determine version bump type
        id: get_type
        run: |
          COMMITS=$(git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --pretty=format:"%s")
          echo "Коммиты в PR:"
          echo "$COMMITS"
          
          if echo "$COMMITS" | grep -qiE "^(feat|feature):"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "✅ Тип обновления: minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|hotfix):"; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "✅ Тип обновления: patch"
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "✅ Тип обновления: patch (по умолчанию)"
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.get_current.outputs.current_version }}"
          TYPE="${{ steps.get_type.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          if [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            VERSION_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            VERSION_TYPE="patch"
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          
          echo "📊 Старая версия: $CURRENT"
          echo "📊 Новая версия: $NEW_VERSION"
          echo "📊 Тип: $VERSION_TYPE"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          echo "✅ Файл VERSION обновлен:"
          cat VERSION

      - name: Force push new version
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Определяем целевую ветку (куда был сделан мерж)
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "🎯 Целевая ветка: $TARGET_BRANCH"
          
          # 🔴 ВАЖНО: Переключаемся на правильную ветку
          echo "🔄 Переключаемся на ветку $TARGET_BRANCH..."
          git checkout $TARGET_BRANCH
          
          # Проверяем текущее состояние
          echo "📊 Текущий статус:"
          git status
          echo "🌿 Текущая ветка:"
          git branch --show-current
          
          # Добавляем файл
          git add VERSION
          
          # Делаем коммит
          git commit -m "[${{ steps.bump.outputs.new_version }}] <- [${{ steps.bump.outputs.old_version }}] ${{ steps.bump.outputs.version_type }} up" || echo "ℹ️ Нет изменений для коммита"
          
          # Получаем последние изменения с удаленного репозитория
          echo "⬇️ Получаем последние изменения из origin/$TARGET_BRANCH..."
          git fetch origin $TARGET_BRANCH
          
          # Показываем различия
          echo "🔍 Различия между локальной и удаленной ветками:"
          git log HEAD..origin/$TARGET_BRANCH --oneline || echo "ℹ️ Удаленная ветка не найдена или нет различий"
          
          # Проверяем, есть ли что пушить
          if git diff --quiet HEAD origin/$TARGET_BRANCH 2>/dev/null; then
            echo "ℹ️ Нет изменений для отправки"
          else
            # ПРИНУДИТЕЛЬНЫЙ PUSH
            echo "🚀 Выполняем force push в $TARGET_BRANCH..."
            git push --force origin $TARGET_BRANCH
            echo "✅ Force push выполнен успешно!"
            
            # Показываем результат
            echo "📋 Последние коммиты после push:"
            git log --oneline -3
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  add-version-label:
    name: "Добавить label с версией"
    needs: bump-version
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Add version label using GitHub Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ needs.bump-version.outputs.new_version }}';
            const labelName = `v${newVersion}`;
            
            console.log(`Attempting to add label: ${labelName} to PR #${context.issue.number}`);
            
            try {
              // Сначала проверяем, существует ли метка
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              }).catch(async () => {
                // Если метка не существует, создаём её
                console.log(`Label ${labelName} does not exist, creating...`);
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '0e8a16',
                  description: `Version ${newVersion}`
                });
              });
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              console.log(`✅ Successfully added label ${labelName}`);
            } catch (error) {
              console.log(`❌ Error: ${error.message}`);
              // Не проваливаем задание, если метку не удалось добавить
            }
